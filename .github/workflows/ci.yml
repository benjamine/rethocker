name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build universal Swift binary
        run: |
          cd swift
          swift build -c release --arch arm64 --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/rethocker-native \
            .build/x86_64-apple-macosx/release/rethocker-native \
            -output ../bin/rethocker-native
          codesign --sign - ../bin/rethocker-native

      - name: Lint & format check
        run: bun run check

      - name: Type-check TypeScript
        run: bun run typecheck

      - name: Run tests
        run: bun test
