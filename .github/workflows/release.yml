name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint & format check
        run: bun run check

      - name: Type-check TypeScript
        run: bun run typecheck

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Build universal Swift binary
        run: |
          cd swift
          swift build -c release --arch arm64 --arch x86_64
          lipo -create \
            .build/apple/Products/Release/rethocker-native \
            -output ../bin/rethocker-native 2>/dev/null || \
          lipo -create \
            .build/arm64-apple-macosx/release/rethocker-native \
            .build/x86_64-apple-macosx/release/rethocker-native \
            -output ../bin/rethocker-native
          codesign --sign - ../bin/rethocker-native

      - name: Build CLI binaries
        run: |
          mkdir -p dist
          bun run build:cli:arm64
          bun run build:cli:x64

      - name: Package release archives
        run: |
          VERSION="${{ github.ref_name }}"

          # arm64: rethocker binary + rethocker-native
          mkdir -p dist/rethocker-darwin-arm64-pkg
          cp dist/rethocker-darwin-arm64 dist/rethocker-darwin-arm64-pkg/rethocker
          cp bin/rethocker-native dist/rethocker-darwin-arm64-pkg/rethocker-native
          tar -czf dist/rethocker-darwin-arm64.tar.gz \
            -C dist/rethocker-darwin-arm64-pkg .

          # x64: rethocker binary + rethocker-native
          mkdir -p dist/rethocker-darwin-x64-pkg
          cp dist/rethocker-darwin-x64 dist/rethocker-darwin-x64-pkg/rethocker
          cp bin/rethocker-native dist/rethocker-darwin-x64-pkg/rethocker-native
          tar -czf dist/rethocker-darwin-x64.tar.gz \
            -C dist/rethocker-darwin-x64-pkg .

          # Compute SHA256 for Homebrew formula
          shasum -a 256 dist/rethocker-darwin-arm64.tar.gz > dist/rethocker-darwin-arm64.tar.gz.sha256
          shasum -a 256 dist/rethocker-darwin-x64.tar.gz   > dist/rethocker-darwin-x64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rethocker-darwin-arm64.tar.gz
            dist/rethocker-darwin-arm64.tar.gz.sha256
            dist/rethocker-darwin-x64.tar.gz
            dist/rethocker-darwin-x64.tar.gz.sha256
          generate_release_notes: true

      - name: Dispatch formula update to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          # Strip leading "v" for the formula version field
          VERSION_BARE="${VERSION#v}"

          SHA256_ARM64=$(awk '{print $1}' dist/rethocker-darwin-arm64.tar.gz.sha256)
          SHA256_X64=$(awk '{print $1}' dist/rethocker-darwin-x64.tar.gz.sha256)

          gh api repos/benjamine/homebrew-tap/dispatches \
            --method POST \
            --field event_type=rethocker-release \
            --field client_payload="{\"version\":\"${VERSION_BARE}\",\"sha256_arm64\":\"${SHA256_ARM64}\",\"sha256_x64\":\"${SHA256_X64}\"}"
