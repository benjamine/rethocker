name: Publish

on:
  push:
    branches: [main]

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version against npm registry
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view rethocker version 2>/dev/null || echo "0.0.0")
          echo "Local: $LOCAL, Published: $PUBLISHED"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"

  build-and-publish:
    name: Build & Publish
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest

    permissions:
      contents: write  # needed to commit the binary back

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token that can push to main (the default GITHUB_TOKEN works
          # if branch protection allows it, otherwise use a PAT)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build universal Swift binary
        run: |
          cd swift
          swift build -c release --arch arm64 --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/rethocker-native \
            .build/x86_64-apple-macosx/release/rethocker-native \
            -output ../bin/rethocker-native
          codesign --sign - ../bin/rethocker-native

      - name: Lint & format check
        run: bun run check

      - name: Type-check TypeScript
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Commit built binary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/rethocker-native
          # Only commit if the binary actually changed
          if ! git diff --cached --quiet; then
            git commit -m "chore: update native binary for v${{ needs.check-version.outputs.version }} [skip ci]"
            git push
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_registry: https://registry.npmjs.org/
